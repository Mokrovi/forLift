# MediaMTX Configuration
    logLevel: info
    readTimeout: 20s
    writeTimeout: 20s

    # RTSP settings - слушаем на всех интерфейсах
    rtspAddress: :8554

    # RTP settings - для видео данных
    rtpAddress: :8000
    rtcpAddress: :8001

    # HTTP API для мониторинга
    api: yes
    apiAddress: :9997

    # Настройки для внешнего доступа
    paths:
      live/stream:
        source: publisher
        # Разрешаем всем читать поток
        readUser: ""
        readPass: ""
        # Разрешаем всем публиковать  
        publishUser: ""
        publishPass: ""
    